<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Protected Site</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .login-box {
      background: #222;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    input {
      padding: 10px;
      width: 200px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .below-text {
      text-align: center;
      color: white;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="login-box">
    <h2>Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <br>
    <button onclick="checkPassword()">Enter</button>
    <p class="error" id="errorMessage"></p>
  </div>

  <h3 class="below-text">Password only given out to specific people, ask evan for more info</h3>

</div>

<script>
  const correctPassword = "47126812";

  function checkPassword() {
    const enteredPassword = document.getElementById("passwordInput").value;
    const errorMessage = document.getElementById("errorMessage");

    if (enteredPassword === correctPassword) {
      window.location.href = "home.html";
    } else {
      errorMessage.textContent = "Incorrect password!";
    }
  }
</script>

</body>
</html>
